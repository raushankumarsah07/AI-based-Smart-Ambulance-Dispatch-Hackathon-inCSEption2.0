<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Ambulance Body -->
  <rect x="10" y="40" width="60" height="30" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <!-- Roof -->
  <rect x="15" y="35" width="50" height="10" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <!-- Windows -->
  <rect x="20" y="37" width="15" height="6" fill="#87CEEB"/>
  <rect x="40" y="37" width="15" height="6" fill="#87CEEB"/>
  <!-- Red Cross -->
  <rect x="45" y="45" width="15" height="5" fill="#DC143C"/>
  <rect x="50" y="40" width="5" height="15" fill="#DC143C"/>
  <!-- Wheels -->
  <circle cx="25" cy="75" r="8" fill="#000000"/>
  <circle cx="65" cy="75" r="8" fill="#000000"/>
  <!-- Lights -->
  <circle cx="15" cy="42" r="2" fill="#FFD700"/>
  <circle cx="70" cy="42" r="2" fill="#FFD700"/>
</svg>
